<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Урок 4: Панель управления роботом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0F0A;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #E8EDE8;
            padding: 2rem;
            min-height: 100vh;
        }

        .dashboard {
            max-width: 800px;
            margin: 0 auto;
            background: #0D110D;
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid #4477AA33;
            box-shadow: 0 0 20px #4477AA22;
        }

        h1 {
            text-align: center;
            color: #4477AA;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #A8B0A8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .servos {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .servo-card {
            background: #1A1C1A;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }

        .servo-card:hover {
            background: #222522;
            transform: translateX(5px);
        }

        .servo-card h3 {
            width: 100px;
            font-size: 1rem;
        }

        .servo-card input {
            flex: 1;
            margin: 0 1rem;
            accent-color: #4477AA;
            cursor: pointer;
        }

        .angle-display {
            width: 50px;
            text-align: center;
            font-weight: bold;
            color: #4477AA;
            font-size: 1.2rem;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn-primary {
            background: #4477AA;
        }

        .btn-primary:hover {
            background: #2F5A88;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #2A3A3A;
        }

        .btn-secondary:hover {
            background: #3A4F4F;
        }

        .btn-danger {
            background: #6B4226;
        }

        .btn-danger:hover {
            background: #8B5A3A;
        }

        .log-panel {
            background: #030503;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .log-panel h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .log-content {
            font-family: monospace;
            font-size: 0.8rem;
            height: 150px;
            overflow-y: auto;
        }

        .log-content div {
            padding: 0.3rem 0;
            border-bottom: 1px solid #1A2A1A;
            color: #A8CBA8;
        }

        .status {
            text-align: right;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .dashboard {
                padding: 1rem;
            }
            .servo-card {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .servo-card h3 {
                width: auto;
            }
            .servo-card input {
                width: 100%;
                margin: 0;
            }
            .actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Панель управления роботом</h1>
        <p class="subtitle">Двигай ползунки — робот меняет положение</p>

        <div class="servos">
            <div class="servo-card">
                <h3>Палец 1</h3>
                <input type="range" id="servo1" min="0" max="180" value="90" step="1">
                <div class="angle-display"><span id="angle1">90</span></div>
            </div>
            <div class="servo-card">
                <h3>Палец 2</h3>
                <input type="range" id="servo2" min="0" max="180" value="90" step="1">
                <div class="angle-display"><span id="angle2">90</span></div>
            </div>
            <div class="servo-card">
                <h3>Палец 3</h3>
                <input type="range" id="servo3" min="0" max="180" value="90" step="1">
                <div class="angle-display"><span id="angle3">90</span></div>
            </div>
        </div>

        <div class="actions">
            <button id="waveBtn" class="btn btn-primary">Помахать</button>
            <button id="resetBtn" class="btn btn-secondary">Сбросить</button>
            <button id="fistBtn" class="btn btn-danger">Сжать кулак</button>
        </div>

        <div class="log-panel">
            <h3>Лог действий</h3>
            <div id="logList" class="log-content">
                <div>Панель запущена</div>
            </div>
        </div>

        <div class="status">
            Arduino: симуляция
        </div>
    </div>

    <script>
        let angles = [90, 90, 90];
        let logMessages = [];

        function addToLog(message) {
            logMessages.unshift(message);
            if (logMessages.length > 10) logMessages.pop();
            const logDiv = document.getElementById('logList');
            logDiv.innerHTML = logMessages.map(msg => `<div>${msg}</div>`).join('');
        }

        function updateUI() {
            for (let i = 0; i < angles.length; i++) {
                document.getElementById(`angle${i+1}`).innerText = angles[i];
                document.getElementById(`servo${i+1}`).value = angles[i];
            }
        }

        function setServo(index, newAngle) {
            angles[index] = newAngle;
            updateUI();
            addToLog(`Сервопривод ${index+1} → ${newAngle}`);
        }

        function waveHand() {
            addToLog(`Мах рукой`);
            setServo(0, 30);
            setServo(1, 30);
            setServo(2, 30);
            setTimeout(() => {
                setServo(0, 90);
                setServo(1, 90);
                setServo(2, 90);
                addToLog(`Рука вернулась`);
            }, 800);
        }

        function resetArm() {
            setServo(0, 90);
            setServo(1, 90);
            setServo(2, 90);
            addToLog(`Сброс`);
        }

        function fistClench() {
            addToLog(`Сжать кулак`);
            setServo(0, 10);
            setServo(1, 10);
            setServo(2, 10);
        }

        function init() {
            for (let i = 1; i <= 3; i++) {
                const slider = document.getElementById(`servo${i}`);
                slider.addEventListener('input', (e) => {
                    const angle = parseInt(e.target.value);
                    setServo(i-1, angle);
                });
            }
            document.getElementById('waveBtn').addEventListener('click', waveHand);
            document.getElementById('resetBtn').addEventListener('click', resetArm);
            document.getElementById('fistBtn').addEventListener('click', fistClench);
            updateUI();
            addToLog(`Панель управления запущена`);
        }

        init();
    </script>
</body>
</html>
